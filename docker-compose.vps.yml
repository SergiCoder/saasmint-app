services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.saasmint.net
        NEXT_PUBLIC_APP_URL: https://app.saasmint.net
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
